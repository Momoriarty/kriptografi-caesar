<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="homePage">
        <div class="card">
            <h1>🔐 Secure Chat Room</h1>
            <p>Kirim pesan rahasia menggunakan Caesar Cipher</p>

            <input type="text" id="username" placeholder="Masukkan nama">
            <input type="number" id="roomKey" placeholder="Kunci Caesar (contoh: 3)" value="3">
            
            <button id="btnCreateRoom">Buat Room Baru</button>

            <div class="divider">atau</div>

            <input type="text" id="roomCode" placeholder="Masukkan kode room">
            
            <button id="btnJoinRoom">Gabung Room</button>
        </div>
    </div>

    <div class="chat-container" id="chatPage" style="display:none;">
        <div class="chat-header">
            <div>
                <h2 id="roomTitle">Room</h2>
                <small id="roomInfo">Secure Chat</small>
            </div>
            <button class="copy-btn" id="btnCopyRoom">Copy Room</button>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input">
            <input type="text" id="message" placeholder="Tulis pesan...">
            <button id="btnSendMessage">Kirim</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
